<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Editor</title>
    <style>
        html, body, #container {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }
        
        #editor {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        #statusbar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background-color: #252526;
            border-top: 1px solid #3e3e3e;
            font-size: 11px;
            color: #858585;
            display: flex;
            align-items: center;
            padding: 0 8px;
            justify-content: space-between;
        }
        
        .status-item {
            margin-right: 12px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="editor"></div>
        <div id="statusbar">
            <div class="status-item" id="language-mode">Dart</div>
            <div class="status-item" id="cursor-position">Ln 1, Col 1</div>
            <div class="status-item" id="encoding">UTF-8</div>
            <div class="status-item" id="eol">LF</div>
        </div>
    </div>

    <script>
        // Monaco Editor configuration
        const editorConfig = {
            value: '// Welcome to DroidCode IDE\n// This is a sample Dart file\n\nclass Sample {\n    String name;\n    int age;\n    \n    Sample(this.name, this.age);\n    \n    void greet() {\n        print("Hello, my name is $name and I am $age years old.");\n    }\n}\n\nvoid main() {\n    var sample = Sample("DroidCode", 1);\n    sample.greet();\n}',
            language: 'dart',
            theme: 'vs-dark',
            fontSize: 14,
            fontFamily: 'JetBrains Mono',
            lineNumbers: 'on',
            minimap: { enabled: true },
            scrollBeyondLastLine: false,
            automaticLayout: true,
            tabSize: 2,
            insertSpaces: true,
            wordWrap: 'on',
            folding: true,
            lineNumbersMinChars: 3
        };

        // Initialize Monaco Editor
        require.config({ paths: { 'vs': 'lib/monaco-editor/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            const editor = monaco.editor.create(document.getElementById('editor'), editorConfig);
            
            // Set up communication with Flutter
            window.editor = editor;
            
            // Handle content changes
            editor.onDidChangeModelContent(function() {
                const content = editor.getValue();
                const position = editor.getPosition();
                
                // Send content to Flutter
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('onContentChanged', content);
                    window.flutter_inappwebview.callHandler('onCursorPosition', position.lineNumber, position.column);
                }
                
                // Update status bar
                updateStatusBar(position);
            });
            
            // Handle cursor position changes
            editor.onDidChangeCursorPosition(function(e) {
                const position = e.position;
                
                // Send cursor position to Flutter
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('onCursorPosition', position.lineNumber, position.column);
                }
                
                // Update status bar
                updateStatusBar(position);
            });
            
            // Handle editor ready
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('onEditorReady');
            }
            
            // Expose methods for Flutter to call
            window.editorBridge = {
                setContent: function(content, language) {
                    const model = editor.getModel();
                    if (model) {
                        model.setValue(content);
                        monaco.editor.setModelLanguage(model, language || 'dart');
                    }
                },
                
                getContent: function() {
                    return editor.getValue();
                },
                
                setTheme: function(theme) {
                    monaco.editor.setTheme(theme);
                },
                
                revealLine: function(line) {
                    editor.revealLine(line);
                    editor.setPosition({ lineNumber: line, column: 1 });
                },
                
                insertText: function(text, line, column) {
                    const position = { lineNumber: line, column: column };
                    editor.executeEdits('', [{
                        range: new monaco.Range(line, column, line, column),
                        text: text
                    }]);
                    editor.setPosition(position);
                },
                
                setLanguage: function(language) {
                    const model = editor.getModel();
                    if (model) {
                        monaco.editor.setModelLanguage(model, language);
                    }
                }
            };
            
            function updateStatusBar(position) {
                document.getElementById('cursor-position').textContent = 
                    `Ln ${position.lineNumber}, Col ${position.column}`;
            }
            
            // Handle window resize
            window.addEventListener('resize', function() {
                editor.layout();
            });
        });
    </script>
</body>
</html>
